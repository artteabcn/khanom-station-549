name = "khanom-station-549"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

pages_build_output_dir = ".open-next"

[[d1_databases]]
binding = "DB"
database_name = "khanom-station-549"
database_id = "ca526e8d-f2b9-4d14-a718-40cba20bea38"
migrations_dir = "drizzle"

# CMS media bucket — created once via:
#   wrangler r2 bucket create khanomstation549-media
# Public objects are served from MEDIA_PUBLIC_URL (env var pointing at the
# R2 public bucket URL or a custom domain like media.khanom-station-549.com).
[[r2_buckets]]
binding = "MEDIA"
bucket_name = "khanomstation549-media"

[vars]
# Comma-separated — owner-email.ts splits on "," to notify all recipients
OWNER_EMAIL = "hello@khanom-station-549.com"
OWNER_FROM_EMAIL = "hello@khanom-station-549.com"

[dev]
port = 8788
